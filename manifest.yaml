name: lobster-haoyun
title: 龙虾好运势
version: 0.4.3
author: ryanbihai
license: MIT-0
runtime: node
entry: src/index.js
min_openclaw_version: "1.0.0"
description: >
  从你的对话和记忆中分析人格，生成每日运势和修炼提醒。
  仅发送城市级位置+年龄段+人格标签到 OceanBus 匿名通道获取节气数据——不发送任何可识别到个人的信息。
  首次使用自动创建 OceanBus 匿名身份（密码学随机地址，可随时更换，不可追踪）。
  OB SDK 完全开源(MIT-0)，代码可审计。
categories:
  - health-fitness
  - productivity-tasks
requires:
  bins:
    - node
  env:
    - name: OCEANBUS_URL
      required: false
      description: OceanBus L0 API base URL
    - name: LUCKY_LOBSTER_SVC_OPENID
      required: false
      description: L1 LuckyLobsterSvc OpenID for calendar/personality enrichment
os:
  - macos
  - linux
  - windows
emoji: 🦞
skillKey: 龙虾好运势
config:
  - key: push_enabled
    type: boolean
    default: true
    description: 是否接收每日运势推送
  - key: push_frequency
    type: number
    default: 1
    description: 每日推送上限
